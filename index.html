<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zona Sfide</title>
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zona Sfide" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="hero-panel">
        <p class="eyebrow">Gioco tra amici</p>
        <h1>Zona Sfide</h1>
        <p class="hero-copy">
          Registrazione immediata, 20 monete iniziali, sfide dirette e saldo
          aggiornato quando il vincitore viene confermato.
        </p>
        <div class="hero-card">
          <span>Regola base</span>
          <strong>
            Chi accetta la sfida decide quante monete sono in gioco.
          </strong>
        </div>
      </aside>

      <main class="main-panel">
        <section id="register-view" class="card"></section>
        <section id="dashboard-view" class="dashboard hidden"></section>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
